<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="'Georgia', 'Times New Roman', serif">
  <defs>
    <!-- Water gradient — much lighter -->
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b8dff0" />
      <stop offset="100%" stop-color="#93cce6" />
    </linearGradient>
    <!-- Sky gradient -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4e6f1" />
      <stop offset="100%" stop-color="#aed6f1" />
    </linearGradient>
    <!-- Finish flag pattern -->
    <pattern id="checker" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#2c3e50"/>
      <rect x="4" y="4" width="4" height="4" fill="#2c3e50"/>
      <rect x="4" width="4" height="4" fill="white"/>
      <rect y="4" width="4" height="4" fill="white"/>
    </pattern>
    <!-- Wave pattern -->
    <pattern id="waves" width="60" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(-2)">
      <path d="M0 6 Q15 0 30 6 Q45 12 60 6" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.35"/>
    </pattern>
  </defs>

  <!-- Sky -->
  <rect width="960" height="540" fill="url(#sky)" />

  <!-- Distant horizon clouds -->
  <ellipse cx="120" cy="60" rx="80" ry="18" fill="white" opacity="0.4" />
  <ellipse cx="750" cy="45" rx="100" ry="15" fill="white" opacity="0.3" />
  <ellipse cx="450" cy="75" rx="60" ry="12" fill="white" opacity="0.25" />

  <!-- Water body -->
  <rect y="290" width="960" height="250" fill="url(#water)" />
  <rect y="290" width="960" height="250" fill="url(#waves)" />

  <!-- ===== FINISH LINE ===== -->
  <line x1="860" y1="150" x2="860" y2="420" stroke="#2c3e50" stroke-width="3" stroke-dasharray="8,4" opacity="0.4"/>
  <rect x="850" y="150" width="18" height="28" fill="url(#checker)" stroke="#2c3e50" stroke-width="1.5"/>
  <line x1="859" y1="150" x2="859" y2="120" stroke="#2c3e50" stroke-width="2"/>
  <text x="860" y="112" text-anchor="middle" font-size="16" fill="#2c3e50" font-weight="bold" letter-spacing="1">FINISH</text>

  <!-- ===== TOP ROW: Pirate Ship A — advantaged area with tailwind ===== -->

  <!-- Wind label + subtitle stacked ABOVE the arrows -->
  <text x="100" y="172" font-size="15" fill="#1e8449" font-weight="bold" font-style="italic" letter-spacing="0.5">TAILWIND</text>
  <text x="100" y="192" font-size="13" fill="#1e8449" font-weight="bold">Low deprivation, low absence</text>

  <!-- Tailwind arrows -->
  <g opacity="0.85">
    <line x1="80" y1="215" x2="200" y2="215" stroke="#27ae60" stroke-width="3"/>
    <line x1="60" y1="235" x2="220" y2="235" stroke="#27ae60" stroke-width="2.5"/>
    <line x1="90" y1="255" x2="190" y2="255" stroke="#27ae60" stroke-width="2.5"/>
    <polygon points="200,215 188,209 188,221" fill="#27ae60"/>
    <polygon points="220,235 208,229 208,241" fill="#27ae60"/>
    <polygon points="190,255 178,249 178,261" fill="#27ae60"/>
  </g>

  <!-- Label for Pirate Ship A (above the boat, clear of mast/flag) -->
  <text x="635" y="118" text-anchor="middle" font-size="17" fill="#2c3e50" font-weight="bold">Area A</text>
  <text x="635" y="136" text-anchor="middle" font-size="14" fill="#4a5a6a" font-style="italic">advantaged, near the finish</text>

  <!-- Pirate Ship A (facing RIGHT toward finish) -->
  <g transform="translate(620, 205)">
    <!-- Hull - dark weathered wood -->
    <path d="M-55,55 Q-60,78 -32,82 L72,82 Q88,78 82,55 Z" fill="#3d2b1a" />
    <!-- Hull plank lines -->
    <line x1="-50" y1="64" x2="78" y2="64" stroke="#1f1408" stroke-width="0.6" opacity="0.6"/>
    <line x1="-48" y1="73" x2="76" y2="73" stroke="#1f1408" stroke-width="0.6" opacity="0.6"/>
    <!-- Gold trim stripe -->
    <rect x="-55" y="55" width="137" height="4" fill="#c9a449"/>
    <!-- Cannon ports -->
    <rect x="-35" y="67" width="6" height="6" fill="#0a0a0a" stroke="#c9a449" stroke-width="0.7"/>
    <rect x="-15" y="67" width="6" height="6" fill="#0a0a0a" stroke="#c9a449" stroke-width="0.7"/>
    <rect x="5" y="67" width="6" height="6" fill="#0a0a0a" stroke="#c9a449" stroke-width="0.7"/>
    <rect x="25" y="67" width="6" height="6" fill="#0a0a0a" stroke="#c9a449" stroke-width="0.7"/>
    <rect x="45" y="67" width="6" height="6" fill="#0a0a0a" stroke="#c9a449" stroke-width="0.7"/>
    <!-- Bowsprit (facing right/forward) -->
    <line x1="72" y1="58" x2="102" y2="46" stroke="#4a3a25" stroke-width="3" stroke-linecap="round"/>
    <!-- Main mast -->
    <line x1="15" y1="55" x2="15" y2="-38" stroke="#4a3a25" stroke-width="3"/>
    <!-- Crow's nest -->
    <rect x="7" y="-38" width="16" height="5" fill="#5d4e37" rx="1"/>
    <line x1="10" y1="-33" x2="10" y2="-28" stroke="#5d4e37" stroke-width="0.8"/>
    <line x1="15" y1="-33" x2="15" y2="-28" stroke="#5d4e37" stroke-width="0.8"/>
    <line x1="20" y1="-33" x2="20" y2="-28" stroke="#5d4e37" stroke-width="0.8"/>
    <!-- Yardarm (horizontal spar) -->
    <line x1="-28" y1="-12" x2="60" y2="-12" stroke="#4a3a25" stroke-width="2"/>
    <!-- Main sail (right) - billowed full with tailwind -->
    <path d="M17,-12 Q42,-8 60,-12 L66,44 Q42,50 17,44 Z" fill="#f5f1e8" stroke="#9b8a70" stroke-width="1" opacity="0.95"/>
    <!-- Main sail (left) -->
    <path d="M13,-12 Q-8,-8 -28,-12 L-26,40 Q-8,46 13,40 Z" fill="#ebe0c8" stroke="#9b8a70" stroke-width="1" opacity="0.9"/>
    <!-- Sail seams -->
    <line x1="17" y1="15" x2="63" y2="15" stroke="#c9bfa8" stroke-width="0.6" opacity="0.7"/>
    <line x1="13" y1="15" x2="-27" y2="15" stroke="#c9bfa8" stroke-width="0.6" opacity="0.7"/>
    <!-- Jolly Roger - streaming RIGHT with tailwind -->
    <rect x="15" y="-52" width="26" height="15" fill="#0a0a0a"/>
    <!-- Skull head -->
    <circle cx="25" cy="-46" r="3.2" fill="white"/>
    <circle cx="23.8" cy="-46.5" r="0.9" fill="#0a0a0a"/>
    <circle cx="26.2" cy="-46.5" r="0.9" fill="#0a0a0a"/>
    <rect x="23.5" y="-44.5" width="3" height="1" fill="#0a0a0a"/>
    <!-- Crossbones -->
    <line x1="21" y1="-42" x2="29" y2="-38" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="29" y1="-42" x2="21" y2="-38" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
    <!-- Water wake behind (left of) boat -->
    <line x1="-60" y1="72" x2="-95" y2="74" stroke="white" stroke-width="1" opacity="0.4"/>
    <line x1="-55" y1="80" x2="-85" y2="82" stroke="white" stroke-width="0.8" opacity="0.3"/>
  </g>

  <!-- ===== BOTTOM ROW: Pirate Ship B — Brighton & Hove with headwind ===== -->

  <!-- Headwind arrows -->
  <g opacity="0.85">
    <line x1="520" y1="340" x2="400" y2="340" stroke="#c0392b" stroke-width="3"/>
    <line x1="540" y1="362" x2="380" y2="362" stroke="#c0392b" stroke-width="2.5"/>
    <line x1="510" y1="384" x2="410" y2="384" stroke="#c0392b" stroke-width="2.5"/>
    <polygon points="400,340 412,334 412,346" fill="#c0392b"/>
    <polygon points="380,362 392,356 392,368" fill="#c0392b"/>
    <polygon points="410,384 422,378 422,390" fill="#c0392b"/>
  </g>

  <!-- Wind label -->
  <text x="470" y="323" font-size="15" fill="#922b21" font-weight="bold" font-style="italic" letter-spacing="0.5">HEADWIND</text>
  <text x="435" y="450" font-size="13" fill="#7b241c" font-weight="bold">Higher deprivation, higher absence</text>

  <!-- Label for Pirate Ship B (above the boat) -->
  <text x="315" y="253" text-anchor="middle" font-size="17" fill="#1a3c5e" font-weight="bold">Brighton &amp; Hove</text>
  <text x="315" y="271" text-anchor="middle" font-size="14" fill="#4a5a6a" font-style="italic">sailing into the wind — still making strong progress</text>

  <!-- Pirate Ship B (also facing RIGHT toward finish — same direction as Ship A) -->
  <g transform="translate(300, 335)">
    <!-- Hull - dark blue-weathered wood -->
    <path d="M-55,55 Q-60,78 -32,82 L72,82 Q88,78 82,55 Z" fill="#1f2d3d" />
    <!-- Hull plank lines -->
    <line x1="-50" y1="64" x2="78" y2="64" stroke="#0a1420" stroke-width="0.6" opacity="0.6"/>
    <line x1="-48" y1="73" x2="76" y2="73" stroke="#0a1420" stroke-width="0.6" opacity="0.6"/>
    <!-- Gold trim stripe -->
    <rect x="-55" y="55" width="137" height="4" fill="#c9a449"/>
    <!-- Cannon ports -->
    <rect x="-35" y="67" width="6" height="6" fill="#0a0a0a" stroke="#c9a449" stroke-width="0.7"/>
    <rect x="-15" y="67" width="6" height="6" fill="#0a0a0a" stroke="#c9a449" stroke-width="0.7"/>
    <rect x="5" y="67" width="6" height="6" fill="#0a0a0a" stroke="#c9a449" stroke-width="0.7"/>
    <rect x="25" y="67" width="6" height="6" fill="#0a0a0a" stroke="#c9a449" stroke-width="0.7"/>
    <rect x="45" y="67" width="6" height="6" fill="#0a0a0a" stroke="#c9a449" stroke-width="0.7"/>
    <!-- Bowsprit NOW ON THE RIGHT (same direction as Ship A) -->
    <line x1="72" y1="58" x2="102" y2="46" stroke="#4a3a25" stroke-width="3" stroke-linecap="round"/>
    <!-- Main mast -->
    <line x1="15" y1="55" x2="15" y2="-38" stroke="#4a3a25" stroke-width="3"/>
    <!-- Crow's nest -->
    <rect x="7" y="-38" width="16" height="5" fill="#5d4e37" rx="1"/>
    <line x1="10" y1="-33" x2="10" y2="-28" stroke="#5d4e37" stroke-width="0.8"/>
    <line x1="15" y1="-33" x2="15" y2="-28" stroke="#5d4e37" stroke-width="0.8"/>
    <line x1="20" y1="-33" x2="20" y2="-28" stroke="#5d4e37" stroke-width="0.8"/>
    <!-- Yardarm (horizontal spar) -->
    <line x1="-28" y1="-12" x2="60" y2="-12" stroke="#4a3a25" stroke-width="2"/>
    <!-- Main sail (right) - pressed inward against headwind -->
    <path d="M17,-12 Q35,-6 55,-12 L58,42 Q35,48 17,42 Z" fill="#f5f1e8" stroke="#9b8a70" stroke-width="1" opacity="0.95"/>
    <!-- Main sail (left) - pressed inward against headwind -->
    <path d="M13,-12 Q-5,-6 -25,-12 L-22,38 Q-5,44 13,38 Z" fill="#ebe0c8" stroke="#9b8a70" stroke-width="1" opacity="0.9"/>
    <!-- Sail seams -->
    <line x1="17" y1="15" x2="56" y2="15" stroke="#c9bfa8" stroke-width="0.6" opacity="0.7"/>
    <line x1="13" y1="15" x2="-23" y2="15" stroke="#c9bfa8" stroke-width="0.6" opacity="0.7"/>
    <!-- Jolly Roger - streaming LEFT into the headwind (flag blown backward) -->
    <path d="M15,-52 L-11,-50 L-11,-37 L15,-37 Z" fill="#0a0a0a"/>
    <!-- Skull head on left-streaming flag -->
    <circle cx="3" cy="-45.5" r="3.2" fill="white"/>
    <circle cx="1.8" cy="-46" r="0.9" fill="#0a0a0a"/>
    <circle cx="4.2" cy="-46" r="0.9" fill="#0a0a0a"/>
    <rect x="1.5" y="-44" width="3" height="1" fill="#0a0a0a"/>
    <!-- Crossbones -->
    <line x1="-1" y1="-41.5" x2="7" y2="-37.5" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="7" y1="-41.5" x2="-1" y2="-37.5" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
    <!-- Water wake behind (left of) boat — boat moves right but slowly due to headwind -->
    <line x1="-60" y1="72" x2="-95" y2="74" stroke="white" stroke-width="1" opacity="0.4"/>
    <line x1="-55" y1="80" x2="-85" y2="82" stroke="white" stroke-width="0.8" opacity="0.3"/>
  </g>

  <!-- ===== BOTTOM ANNOTATION BOX ===== -->
  <rect x="30" y="475" width="900" height="55" rx="6" fill="#2c3e50" opacity="0.1"/>
  <text x="480" y="498" text-anchor="middle" font-size="15" fill="#1a2a3a" font-weight="bold">
    Raw league tables compare finishing positions. Our model adjusts for the wind.
  </text>
  <text x="480" y="518" text-anchor="middle" font-size="13" fill="#4a5a6a" font-style="italic">
    After accounting for structural headwinds, Brighton &amp; Hove ranks in the top 10 of 152 local authorities.
  </text>

</svg>
