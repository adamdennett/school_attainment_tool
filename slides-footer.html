<div class="slide-footer-logos">
  <img src="slides_assets/casa-logo.png" alt="CASA logo">
  <div class="footer-divider"></div>
  <img src="slides_assets/ai4ci-logo.svg" alt="AI4CI logo">
</div>
<script>
(function () {
  function updateChrome() {
    if (typeof Reveal === 'undefined' || !Reveal.getCurrentSlide) return;
    var current = Reveal.getCurrentSlide();
    var isTitle = current && current.id === 'title-slide';
    var isDivider = current && current.classList && current.classList.contains('divider-slide');

    var logo = document.querySelector('.slide-logo');
    if (logo) logo.style.display = isDivider ? 'none' : '';

    var footer = document.querySelector('.slide-footer-logos');
    if (footer) footer.style.display = isTitle ? 'none' : '';
    // NOTE: the title slide's purple background (gradient + accent bar) is no
    // longer hidden here. It now lives on the #title-slide SECTION in the theme
    // SCSS, which reveal hides reliably on mobile — so no JS toggle is needed.
  }

  // Attach as soon as Reveal is available, polling until it loads. Do NOT rely
  // on DOMContentLoaded: this inline script runs at the end of <body>, so that
  // event may already have fired (its listener would never run), and on slower
  // mobile devices Reveal can be undefined when it does fire — either way the
  // handlers went unattached and the title background kept bleeding.
  function attach() {
    if (typeof Reveal === 'undefined' || !Reveal.on) { setTimeout(attach, 50); return; }
    Reveal.on('slidechanged', updateChrome);
    Reveal.on('ready', updateChrome);
    updateChrome();
  }
  attach();
})();
</script>
