<div class="slide-footer-logos">
  <img src="slides_assets/casa-logo.png" alt="CASA logo">
  <div class="footer-divider"></div>
  <img src="slides_assets/ai4ci-logo.svg" alt="AI4CI logo">
</div>
<script>
// Hide default logo + footer logos on title & divider slides
document.addEventListener('DOMContentLoaded', function() {
  function updateLogos() {
    var current = Reveal.getCurrentSlide();
    var isTitle = current && current.id === 'title-slide';
    var isDivider = current && current.classList.contains('divider-slide');
    var hide = isTitle || isDivider;

    var logo = document.querySelector('.slide-logo');
    if (logo) logo.style.display = isDivider ? 'none' : '';

    var footer = document.querySelector('.slide-footer-logos');
    if (footer) footer.style.display = isTitle ? 'none' : '';

    // Hide the title slide's purple background (image + gradient overlay +
    // accent bar) whenever the title slide is not the current slide. Done in JS
    // (not CSS) because on mobile Chromium reveal's section hiding works but its
    // background-layer hiding does NOT: the title background keeps painting even
    // when its slide is not current, so the purple gradient bleeds onto every
    // slide. (CSS `opacity`/`visibility` don't suppress the inner image div, and
    // `:has(#title-slide.present)` doesn't re-invalidate on navigation on mobile
    // Blink.) A direct inline `display` toggle on `slidechanged` is reliable.
    //
    // Target the background structurally as `:first-child` — the SAME selector
    // the gradient CSS uses — NOT by the `.quarto-title-block` class. reveal
    // copies that class onto the background element on desktop but not reliably
    // on mobile, so a class-based query returned null on phones and nothing got
    // hidden (which is exactly why this bled on mobile but not desktop).
    //
    // Use an explicit 'block' (not '') for the title slide: reveal drives the
    // background's display via its own inline style, and clearing it to ''
    // reverts to reveal's base `display:none`, blanking the title on its own
    // slide.
    var titleBg = document.querySelector('.reveal .backgrounds .slide-background:first-child');
    if (titleBg) titleBg.style.display = isTitle ? 'block' : 'none';
  }
  if (typeof Reveal !== 'undefined') {
    Reveal.on('slidechanged', updateLogos);
    Reveal.on('ready', updateLogos);
  }
});
</script>
