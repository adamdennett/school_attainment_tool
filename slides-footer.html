<div class="slide-footer-logos">
  <img src="slides_assets/casa-logo.png" alt="CASA logo">
  <div class="footer-divider"></div>
  <img src="slides_assets/ai4ci-logo.svg" alt="AI4CI logo">
</div>
<script>
// Hide default logo + footer logos on title & divider slides
document.addEventListener('DOMContentLoaded', function() {
  function updateLogos() {
    var current = Reveal.getCurrentSlide();
    var isTitle = current && current.id === 'title-slide';
    var isDivider = current && current.classList.contains('divider-slide');
    var hide = isTitle || isDivider;

    var logo = document.querySelector('.slide-logo');
    if (logo) logo.style.display = isDivider ? 'none' : '';

    var footer = document.querySelector('.slide-footer-logos');
    if (footer) footer.style.display = isTitle ? 'none' : '';

    // Hide the title slide's purple background whenever the title slide is not
    // the current slide. This is done in JS (not CSS) because CSS approaches
    // are unreliable on mobile Chromium: reveal's own opacity/visibility
    // hiding of the background layer does not suppress the inner image div,
    // and `:has(#title-slide.present)` fails to re-invalidate on navigation on
    // mobile Blink — both leave the purple art bleeding onto every slide.
    // A direct inline display toggle on `slidechanged` is reliable everywhere.
    // Use an explicit 'block' (not '') for the title slide: reveal drives the
    // background's display via its own inline style, and clearing it to ''
    // reverts to reveal's base `display:none`, blanking the title on its own
    // slide.
    var titleBg = document.querySelector('.reveal .backgrounds .slide-background.quarto-title-block');
    if (titleBg) titleBg.style.display = isTitle ? 'block' : 'none';
  }
  if (typeof Reveal !== 'undefined') {
    Reveal.on('slidechanged', updateLogos);
    Reveal.on('ready', updateLogos);
  }
});
</script>
