name: Deploy docs/ to GitHub Pages

# Publishes the pre-rendered static site in docs/ via the GitHub Actions
# Pages pipeline (upload-pages-artifact + deploy-pages). This replaces the
# legacy Jekyll build, which was timing out on the ~135 MB site (10-minute
# hard limit). The artifact upload has no Jekyll processing and a far larger
# size allowance, so large embedded-resource HTML files deploy reliably.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload docs/ artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
